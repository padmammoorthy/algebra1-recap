<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges - Algebra 1 Recap</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📐 Algebra 1</h2>
            </div>
            <ul class="nav-links">
                <li><a th:href="@{/lessons}">🎓 Lessons</a></li>
                <li><a th:href="@{/quiz}">✏️ Practice Test</a></li>
                <li><a th:href="@{/tests}">📝 Tests</a></li>
                <li class="active"><a th:href="@{/badges}">🏆 Badges</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <h1>Badges</h1>
                <div class="profile-section" th:if="${currentUser}">
                    <span class="avatar" th:if="${currentUser.avatarType == 'emoji'}" th:text="${currentUser.avatar}"></span>
                    <img th:if="${currentUser.avatarType == 'image'}" th:src="${currentUser.avatar}" class="avatar-img" alt="Avatar">
                    <span class="display-name" th:text="${currentUser.displayName}"></span>
                    <a th:href="@{/logout}" class="sign-out">Sign Out</a>
                </div>
            </header>

            <div class="badges-container">
                <div class="badges-stats">
                    <p th:text="'You have earned ' + ${earnedBadges.size()} + ' of ' + ${allBadges.size()} + ' badges'"></p>
                </div>

                <div class="badges-grid">
                    <div th:each="badge : ${allBadges}" class="badge-card"
                         th:classappend="${earnedNames.contains(badge['name'])} ? 'earned' : 'unearned'">
                        <div class="badge-icon">
                            <span th:text="${badge['emoji']}"></span>
                        </div>
                        <h3 th:text="${badge['name']}"></h3>
                        <p th:text="${badge['description']}"></p>
                        <span th:if="${earnedNames.contains(badge['name'])}" class="earned-label">✓ Earned</span>
                        <span th:unless="${earnedNames.contains(badge['name'])}" class="locked-label">🔒 Locked</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
