<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up - Algebra 1 Recap</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body student-theme">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📐 Create Student Account</h1>
                <p>Join and start mastering Algebra 1!</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a password" minlength="4">
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" name="displayName" required placeholder="Your name">
                </div>

                <div class="form-group">
                    <label>Avatar</label>
                    <div class="avatar-tabs">
                        <button type="button" class="tab-btn active" onclick="showTab('emoji')">Emoji</button>
                        <button type="button" class="tab-btn" onclick="showTab('image')">Image URL</button>
                    </div>

                    <div id="emoji-tab" class="avatar-tab-content">
                        <input type="hidden" id="avatarType" name="avatarType" value="emoji">
                        <input type="hidden" id="avatarValue" name="avatar" value="📚">
                        <div class="emoji-picker">
                            <span class="emoji-option selected" onclick="selectEmoji(this, '📚')">📚</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🎓')">🎓</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🧮')">🧮</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '📐')">📐</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🚀')">🚀</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '⭐')">⭐</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🦊')">🦊</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🐱')">🐱</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🦉')">🦉</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🐼')">🐼</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🌈')">🌈</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🎮')">🎮</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🎨')">🎨</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '🏆')">🏆</span>
                            <span class="emoji-option" onclick="selectEmoji(this, '💎')">💎</span>
                        </div>
                    </div>

                    <div id="image-tab" class="avatar-tab-content" style="display:none">
                        <input type="url" id="imageUrl" placeholder="https://example.com/avatar.png" oninput="setImageAvatar(this.value)">
                        <p class="hint">Paste a URL to your avatar image</p>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a th:href="@{/login/student}">Sign in</a></p>
                <p><a th:href="@{/portal}">← Back to portal selection</a></p>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('emoji-tab').style.display = tab === 'emoji' ? 'block' : 'none';
            document.getElementById('image-tab').style.display = tab === 'image' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('avatarType').value = tab;
            if (tab === 'emoji') {
                const selected = document.querySelector('.emoji-option.selected');
                if (selected) document.getElementById('avatarValue').value = selected.textContent;
            }
        }
        function selectEmoji(el, emoji) {
            document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('avatarValue').value = emoji;
            document.getElementById('avatarType').value = 'emoji';
        }
        function setImageAvatar(url) {
            document.getElementById('avatarValue').value = url;
            document.getElementById('avatarType').value = 'image';
        }
    </script>
</body>
</html>
