<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice - Algebra 1 Recap</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📐 Algebra 1</h2>
            </div>
            <ul class="nav-links">
                <li><a th:href="@{/lessons}">🎓 Lessons</a></li>
                <li class="active"><a th:href="@{/quiz}">✏️ Practice</a></li>
                <li><a th:href="@{/tests}">📝 Tests</a></li>
                <li><a th:href="@{/badges}">🏆 Badges</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <h1>Practice Questions</h1>
                <div class="profile-section" th:if="${currentUser}">
                    <span class="avatar" th:if="${currentUser.avatarType == 'emoji'}" th:text="${currentUser.avatar}"></span>
                    <img th:if="${currentUser.avatarType == 'image'}" th:src="${currentUser.avatar}" class="avatar-img" alt="Avatar">
                    <span class="display-name" th:text="${currentUser.displayName}"></span>
                    <a th:href="@{/logout}" class="sign-out">Sign Out</a>
                </div>
            </header>

            <div class="questions-container">
                <div th:each="question, iterStat : ${questions}" class="question-card" th:id="'question-' + ${question.id}">
                    <div class="question-header">
                        <span class="lesson-tag" th:text="${question.lessonTitle}"></span>
                        <span class="question-num" th:text="'Q' + (${currentPage} * 5 + ${iterStat.index} + 1)"></span>
                    </div>
                    <p class="question-text" th:text="${question.questionText}"></p>

                    <div class="choices">
                        <button class="choice-btn" th:data-question="${question.id}" th:data-answer="A"
                                onclick="checkAnswer(this)">
                            <span class="choice-letter">A</span>
                            <span th:text="${question.optionA}"></span>
                        </button>
                        <button class="choice-btn" th:data-question="${question.id}" th:data-answer="B"
                                onclick="checkAnswer(this)">
                            <span class="choice-letter">B</span>
                            <span th:text="${question.optionB}"></span>
                        </button>
                        <button class="choice-btn" th:data-question="${question.id}" th:data-answer="C"
                                onclick="checkAnswer(this)">
                            <span class="choice-letter">C</span>
                            <span th:text="${question.optionC}"></span>
                        </button>
                        <button class="choice-btn" th:data-question="${question.id}" th:data-answer="D"
                                onclick="checkAnswer(this)">
                            <span class="choice-letter">D</span>
                            <span th:text="${question.optionD}"></span>
                        </button>
                    </div>

                    <div class="result-area" style="display:none">
                        <div class="result-message"></div>
                        <div class="hint-text"></div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 0}" th:href="@{/quiz(page=${currentPage - 1})}" class="page-btn">← Previous</a>
                    <span class="page-info" th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>
                    <a th:if="${currentPage < totalPages - 1}" th:href="@{/quiz(page=${currentPage + 1})}" class="page-btn">Next →</a>
                </div>
            </div>
        </main>
    </div>

    <script>
        function checkAnswer(btn) {
            const questionId = btn.dataset.question;
            const selectedAnswer = btn.dataset.answer;
            const card = document.getElementById('question-' + questionId);
            const buttons = card.querySelectorAll('.choice-btn');
            const resultArea = card.querySelector('.result-area');

            // Disable all buttons
            buttons.forEach(b => b.disabled = true);

            fetch('/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `questionId=${questionId}&selectedAnswer=${selectedAnswer}`
            })
            .then(response => response.json())
            .then(data => {
                resultArea.style.display = 'block';
                const msgEl = resultArea.querySelector('.result-message');
                const hintEl = resultArea.querySelector('.hint-text');

                if (data.correct) {
                    btn.classList.add('correct');
                    msgEl.textContent = '✅ Correct!';
                    msgEl.className = 'result-message correct';
                } else {
                    btn.classList.add('incorrect');
                    msgEl.textContent = '❌ Incorrect. The correct answer is ' + data.correctAnswer + '.';
                    msgEl.className = 'result-message incorrect';
                    // Highlight correct answer
                    buttons.forEach(b => {
                        if (b.dataset.answer === data.correctAnswer) b.classList.add('correct');
                    });
                    if (data.hint) {
                        hintEl.textContent = '💡 Hint: ' + data.hint;
                        hintEl.style.display = 'block';
                    }
                }
            });
        }
    </script>
</body>
</html>
