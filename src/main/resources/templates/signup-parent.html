<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Sign Up - Algebra 1 Recap</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-body parent-theme">
    <div class="auth-container">
        <div class="auth-card parent-card">
            <div class="auth-header">
                <h1>👨‍👩‍👧 Create Parent Account</h1>
                <p>Monitor your child's learning progress</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/signup/parent}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a password" minlength="4">
                </div>
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" name="displayName" required placeholder="Your name">
                </div>

                <button type="submit" class="btn btn-primary btn-parent">Create Parent Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a th:href="@{/login/parent}">Sign in</a></p>
                <p><a th:href="@{/portal}">← Back to portal selection</a></p>
            </div>
        </div>
    </div>
</body>
</html>
