<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${lesson.title} + ' - Algebra 1 Recap'">Lesson</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <link rel="stylesheet" th:href="@{/css/lessons.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📐 Algebra 1</h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a th:href="@{/lessons}">🎓 Lessons</a></li>
                <li><a th:href="@{/quiz}">✏️ Practice</a></li>
                <li><a th:href="@{/tests}">📝 Tests</a></li>
                <li><a th:href="@{/badges}">🏆 Badges</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <h1 class="page-title">🎓 Lessons</h1>
                <div class="profile-section" th:if="${currentUser}">
                    <span class="avatar" th:if="${currentUser.avatarType == 'emoji'}" th:text="${currentUser.avatar}"></span>
                    <img th:if="${currentUser.avatarType == 'image'}" th:src="${currentUser.avatar}" class="avatar-img" alt="Avatar">
                    <span class="display-name" th:text="${currentUser.displayName}"></span>
                    <a th:href="@{/logout}" class="sign-out">Sign Out</a>
                </div>
            </header>

            <div class="lessons-layout">
                <!-- Table of Contents Panel -->
                <aside class="toc-panel">
                    <h3>Table of Contents</h3>
                    <div class="toc-chapters">
                        <div th:each="entry : ${lessonsByChapter}" class="toc-chapter">
                            <div class="toc-chapter-title" th:text="${entry.key}"></div>
                            <ul class="toc-list">
                                <li th:each="l : ${entry.value}" class="toc-item" th:classappend="${l.slug == lesson.slug} ? 'active' : ''">
                                    <a th:href="@{/lessons/{slug}(slug=${l.slug})}">
                                        <span class="toc-section-num" th:text="${l.getIcon()}"></span>
                                        <span th:text="${l.title}"></span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </aside>

                <!-- Lesson Content -->
                <article class="lesson-detail">
                <div class="lesson-detail-header">
                    <span class="lesson-num" th:text="${lesson.getIcon()}"></span>
                    <h1 th:text="${lesson.title}"></h1>
                    <p class="lesson-desc" th:text="${lesson.description}"></p>
                </div>

                <!-- Sections -->
                <div th:each="section : ${lesson.sections}" class="lesson-section">
                    <h2 th:text="${section.heading}"></h2>
                    <div class="section-explanation" th:text="${section.explanation}"></div>

                    <!-- Illustration -->
                    <div th:if="${section.illustration}" class="section-illustration" th:utext="${section.illustration}"></div>

                    <!-- Worked Examples -->
                    <div th:if="${section.examples}" class="worked-examples">
                        <div th:each="example : ${section.examples}" class="example-card">
                            <div class="example-problem">
                                <strong>Problem:</strong> <span th:text="${example.problem}"></span>
                            </div>
                            <div class="example-steps">
                                <strong>Solution:</strong>
                                <ol>
                                    <li th:each="step : ${example.steps}" th:text="${step}"></li>
                                </ol>
                            </div>
                            <div class="example-answer">
                                <strong>Answer:</strong> <span th:text="${example.answer}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Key Takeaways -->
                <div th:if="${lesson.keyTakeaways}" class="key-takeaways">
                    <h2>🔑 Key Takeaways</h2>
                    <ul>
                        <li th:each="takeaway : ${lesson.keyTakeaways}" th:text="${takeaway}"></li>
                    </ul>
                </div>
            </article>
            </div>
        </main>
    </div>
</body>
</html>
