<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests - Algebra 1 Recap</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>📐 Algebra 1</h2>
            </div>
            <ul class="nav-links">
                <li><a th:href="@{/lessons}">🎓 Lessons</a></li>
                <li><a th:href="@{/quiz}">✏️ Practice Test</a></li>
                <li class="active"><a th:href="@{/tests}">📝 Tests</a></li>
                <li><a th:href="@{/badges}">🏆 Badges</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <h1>Tests</h1>
                <div class="profile-section" th:if="${currentUser}">
                    <span class="avatar" th:if="${currentUser.avatarType == 'emoji'}" th:text="${currentUser.avatar}"></span>
                    <img th:if="${currentUser.avatarType == 'image'}" th:src="${currentUser.avatar}" class="avatar-img" alt="Avatar">
                    <span class="display-name" th:text="${currentUser.displayName}"></span>
                    <a th:href="@{/logout}" class="sign-out">Sign Out</a>
                </div>
            </header>

            <div class="tests-container">
                <div th:each="entry : ${testsByDifficulty}" class="difficulty-section">
                    <h2 class="difficulty-title">
                        <span th:if="${entry.key == 'EASY'}" class="difficulty-badge easy">🟢 Easy</span>
                        <span th:if="${entry.key == 'MEDIUM'}" class="difficulty-badge medium">🟡 Medium</span>
                        <span th:if="${entry.key == 'HARD'}" class="difficulty-badge hard">🔴 Hard</span>
                    </h2>
                    <div class="test-cards-grid">
                        <a th:each="test : ${entry.value}"
                           th:href="@{/tests/{id}(id=${test.id})}"
                           class="test-card">
                            <div class="test-card-header">
                                <h3 th:text="${test.name}"></h3>
                                <span class="test-category" th:text="${test.category}"></span>
                            </div>
                            <p th:text="${test.description}"></p>
                            <span class="test-card-action">Start Test →</span>
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
