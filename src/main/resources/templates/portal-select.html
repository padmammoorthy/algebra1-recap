<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra 1 Recap - Portal</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/portal-select.css}">
</head>
<body class="portal-body">
    <div class="portal-container">
        <div class="portal-header">
            <h1>📐 Algebra 1 Recap</h1>
            <p>Choose your portal to get started</p>
        </div>

        <div class="portal-cards">
            <a th:href="@{/login/student}" class="portal-card student-card">
                <div class="portal-icon">
                    <img th:src="@{/images/student-icon.svg}" alt="Student">
                </div>
                <h2>Student Portal</h2>
                <p>Access lessons, practice questions, and tests to master Algebra 1</p>
                
            </a>

            <a th:href="@{/login/parent}" class="portal-card parent-card">
                <div class="portal-icon">
                    <img th:src="@{/images/parent-icon.svg}" alt="Parent">
                </div>
                <h2>Parent Portal</h2>
                <p>Monitor progress, view test scores, and track your child's learning journey</p>
                
            </a>
        </div>
    </div>
</body>
</html>
