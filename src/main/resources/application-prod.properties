# Production config - use PostgreSQL on AWS RDS
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/algebra1db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
server.port=${SERVER_PORT:${PORT:8080}}

# Connection pool settings - fail fast with clear error
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
