# Production config - use PostgreSQL on AWS RDS (EB-managed or standalone)
# EB-managed RDS provides RDS_HOSTNAME, RDS_PORT, RDS_DB_NAME, RDS_USERNAME, RDS_PASSWORD
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${RDS_HOSTNAME:localhost}:${RDS_PORT:5432}/${RDS_DB_NAME:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:${RDS_USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${RDS_PASSWORD:}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
server.port=${SERVER_PORT:${PORT:8080}}

# Connection pool settings
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
